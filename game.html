<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0f1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 680px; width: 100%; }

  h1 {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, #f7c948, #ee5a6f, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #555; font-size: 0.95rem; margin-bottom: 2rem; }

  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-text { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .progress-track { background: #1a1d2a; border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #7c5cfc, #ee5a6f, #f7c948);
    transition: width 0.4s ease;
  }
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #555;
  }
  .score-bar span { color: #999; }

  .card {
    background: #181a24;
    border: 1px solid #2a2d3a;
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .q-meta {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .badge {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.65rem;
    border-radius: 6px;
    font-weight: 600;
  }
  .badge-topic { background: rgba(124,92,252,0.15); color: #a48bfc; }
  .badge-easy { background: rgba(76,175,80,0.15); color: #66bb6a; }
  .badge-medium { background: rgba(255,183,77,0.15); color: #ffb74d; }
  .badge-hard { background: rgba(239,83,80,0.15); color: #ef5350; }

  .q-text {
    font-size: 1.25rem;
    line-height: 1.6;
    margin-bottom: 1.5rem;
    color: #eee;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .answer-btn {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    padding: 0.9rem 1.1rem;
    background: #12131b;
    border: 2px solid #2a2d3a;
    border-radius: 12px;
    color: #ccc;
    font-size: 1.05rem;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: #7c5cfc;
    background: rgba(124,92,252,0.08);
    transform: translateX(4px);
  }
  .answer-btn:disabled { cursor: default; opacity: 0.6; }
  .answer-btn .letter {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: #2a2d3a;
    font-weight: 700;
    font-size: 0.85rem;
    color: #888;
    flex-shrink: 0;
  }
  .answer-btn.selected { border-color: #7c5cfc; background: rgba(124,92,252,0.12); }
  .answer-btn.selected .letter { background: #7c5cfc; color: #fff; }
  .answer-btn.correct { border-color: #66bb6a; background: rgba(76,175,80,0.12); }
  .answer-btn.correct .letter { background: #66bb6a; color: #fff; }
  .answer-btn.wrong { border-color: #ef5350; background: rgba(239,83,80,0.08); }
  .answer-btn.wrong .letter { background: #ef5350; color: #fff; }
  .answer-btn.dimmed { opacity: 0.35; }

  .hint-area {
    margin-top: 1rem;
    display: none;
  }
  .hint-box {
    background: rgba(255,183,77,0.1);
    border: 1px solid rgba(255,183,77,0.3);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    color: #ffb74d;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 0.8rem;
  }
  .hint-label { font-weight: 700; margin-right: 0.4rem; }
  .eliminated-text { color: #888; font-size: 0.85rem; font-style: italic; }

  .feedback-area {
    margin-top: 1rem;
    display: none;
  }
  .feedback-box {
    border-radius: 10px;
    padding: 1rem 1.1rem;
    font-size: 1rem;
    line-height: 1.5;
  }
  .feedback-box.correct-fb {
    background: rgba(76,175,80,0.1);
    border: 1px solid #388e3c;
    color: #81c784;
  }
  .feedback-box.correct-fb .fb-title { color: #66bb6a; }
  .feedback-box .fb-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.3rem; }
  .feedback-box .fb-explain { opacity: 0.85; }

  .btn {
    display: inline-block;
    padding: 0.75rem 1.8rem;
    font-size: 1rem;
    font-family: inherit;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    margin-top: 1rem;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-next { background: #f7c948; color: #111; font-weight: 600; }
  .btn-restart { background: #7c5cfc; color: #fff; }

  .btn-area { margin-top: 1rem; display: none; }

  .attempts-counter {
    text-align: center;
    color: #555;
    font-size: 0.8rem;
    margin-top: 0.5rem;
  }

  /* Results */
  .results { text-align: center; padding: 2.5rem 2rem; }
  .results .big-score {
    font-size: 4.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #f7c948, #ee5a6f, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .results .out-of { color: #555; font-size: 1.1rem; margin-bottom: 0.5rem; }
  .results .message { color: #ccc; font-size: 1.2rem; margin-bottom: 0.3rem; }
  .results .stats { color: #666; font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.8; }

  .hidden { display: none !important; }

  @keyframes flash-green {
    0%, 100% { border-color: #66bb6a; background: rgba(76,175,80,0.12); }
    50% { border-color: #a5d6a7; background: rgba(76,175,80,0.3); }
  }
  .answer-btn.flash-correct {
    animation: flash-green 0.5s ease 4;
    border-color: #66bb6a;
    background: rgba(76,175,80,0.12);
  }
  .answer-btn.flash-correct .letter { background: #66bb6a; color: #fff; }

  .hint-offer-btn {
    display: inline-block;
    padding: 0.5rem 1.2rem;
    font-size: 0.95rem;
    font-family: inherit;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 0.5rem 0.3rem 0 0;
    transition: transform 0.1s, opacity 0.2s;
  }
  .hint-offer-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .hint-yes { background: #f7c948; color: #111; font-weight: 600; }
  .hint-no { background: #2a2d3a; color: #ccc; }
</style>
</head>
<body>
<div class="container">
  <h1>Quiz Game</h1>
  <div class="subtitle">Wizard of Oz & Trump Administration -- Keep guessing until you get it right!</div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-text" id="progressText">Question 1 of 30</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="score-bar">
      <div>Score: <span id="scoreDisplay">0</span></div>
      <div>First try: <span id="firstTryDisplay">0</span></div>
      <div>Streak: <span id="streakDisplay">0</span></div>
    </div>
  </div>

  <div class="card" id="quizCard">
    <div class="q-meta" id="qMeta"></div>
    <div class="q-text" id="qText"></div>
    <div class="answers" id="answersArea"></div>
    <div class="attempts-counter" id="attemptsCounter"></div>
    <div class="hint-area" id="hintArea"></div>
    <div class="feedback-area" id="feedbackArea"></div>
    <div class="btn-area" id="btnArea"></div>
  </div>

  <div class="card results hidden" id="resultsCard">
    <div class="big-score" id="finalScore"></div>
    <div class="out-of" id="outOf">out of 50</div>
    <div class="message" id="resultMsg"></div>
    <div class="stats" id="resultStats"></div>
    <button class="btn btn-restart" id="restartBtn">Play Again</button>
  </div>
</div>

[{"topic": "Music", "question": "What Beatles song contains the lyric 'Nothing you can do that can't be done'?", "correct_answer": "All You Need Is Love", "answers": ["All You Need Is Love", "Let It Be", "Hey Jude", "The Word"], "explanation": "The Beatles performed this live via satellite to an estimated 400 million viewers in 25 countries on June 25, 1967. It was the first-ever global television broadcast.", "hint": "The song was the U.K.'s contribution to a global broadcast called Our World.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Scrambled eggs, oh my baby how I love your legs'?", "correct_answer": "Yesterday", "answers": ["Yesterday", "Let It Be", "Something", "Here, There and Everywhere"], "explanation": "Paul McCartney used those placeholder lyrics while working out the melody. He eventually replaced them, and the finished song became the most covered song in recorded music history.", "hint": "Paul McCartney says the melody came to him in a dream.", "difficulty": "hard"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'He wear no shoeshine, he got toe-jam football'?", "correct_answer": "Come Together", "answers": ["Come Together", "I Am the Walrus", "Happiness Is a Warm Gun", "Glass Onion"], "explanation": "John Lennon originally wrote the song as a campaign theme for Timothy Leary's run for governor of California. Leary went to prison before the campaign got far.", "hint": "It's the opening track on Abbey Road.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Sitting in an English garden waiting for the sun'?", "correct_answer": "I Am the Walrus", "answers": ["I Am the Walrus", "Strawberry Fields Forever", "A Day in the Life", "Lucy in the Sky with Diamonds"], "explanation": "Lennon deliberately wrote nonsensical lyrics after learning that a teacher at his old school was having students analyze Beatles songs in class. He wanted to confuse them.", "hint": "It's from the Magical Mystery Tour album, released in 1967.", "difficulty": "hard"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Will you still need me, will you still feed me'?", "correct_answer": "When I'm Sixty-Four", "answers": ["When I'm Sixty-Four", "In My Life", "Here, There and Everywhere", "Michelle"], "explanation": "Paul McCartney wrote the melody as a teenager and dusted it off for the Sgt. Pepper album. He recorded it on his father Jim's 64th birthday.", "hint": "Paul McCartney wrote the melody when he was a teenager.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Desmond has a barrow in the marketplace'?", "correct_answer": "Ob-La-Di, Ob-La-Da", "answers": ["Ob-La-Di, Ob-La-Da", "Rocky Raccoon", "Maxwell's Silver Hammer", "Octopus's Garden"], "explanation": "John Lennon hated this song and called it 'granny music.' A Nigerian musician named Jimmy Scott had used the phrase 'ob-la-di, ob-la-da' and later sued for a songwriting credit.", "hint": "It's from the White Album and has a ska-influenced rhythm.", "difficulty": "hard"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Woke up, fell out of bed, dragged a comb across my head'?", "correct_answer": "A Day in the Life", "answers": ["A Day in the Life", "Good Morning Good Morning", "I'm Only Sleeping", "Getting Better"], "explanation": "The song closes out Sgt. Pepper's Lonely Hearts Club Band. The final piano chord was played on three pianos simultaneously and left to ring for over 40 seconds.", "hint": "The final chord on this track rings for over 40 seconds.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Little darling, it's been a long cold lonely winter'?", "correct_answer": "Here Comes the Sun", "answers": ["Here Comes the Sun", "Good Day Sunshine", "Rain", "Dear Prudence"], "explanation": "George Harrison wrote the song in Eric Clapton's garden while skipping a business meeting at Apple Corps. It was one of the first songs composed on a Moog synthesizer.", "hint": "It's on Abbey Road and was written by the band's lead guitarist.", "difficulty": "easy"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Sleeps pretty well on a bed of nails'?", "correct_answer": "Happiness Is a Warm Gun", "answers": ["Happiness Is a Warm Gun", "Helter Skelter", "Revolution", "Yer Blues"], "explanation": "Lennon got the title from the cover of a gun magazine that George Martin showed him. The song shifts between four different musical styles in under three minutes.", "hint": "It's from the White Album and changes musical styles several times.", "difficulty": "hard"}, {"topic": "Music", "question": "What Beatles song contains the lyric 'Take a sad song and make it better'?", "correct_answer": "Hey Jude", "answers": ["Hey Jude", "Let It Be", "Hello, Goodbye", "All You Need Is Love"], "explanation": "Paul McCartney wrote the song to comfort John Lennon's son Julian during his parents' divorce. The original working title was 'Hey Jules.'", "hint": "The original working title used a different name — 'Jules.'", "difficulty": "easy"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'War, children, it's just a shot away'?", "correct_answer": "Gimme Shelter", "answers": ["Gimme Shelter", "Street Fighting Man", "Sympathy for the Devil", "Paint It Black"], "explanation": "The female vocal is by Merry Clayton, who was called to the studio late at night while pregnant. She sang with such intensity that her voice cracks audibly during the recording.", "hint": "It's the opening track on the album Let It Bleed.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'Am I hard enough, am I rough enough'?", "correct_answer": "Beast of Burden", "answers": ["Beast of Burden", "Wild Horses", "Miss You", "Start Me Up"], "explanation": "Mick Jagger wrote the lyrics as a plea to a woman, but the title came from a joking comment Keith Richards made about their working relationship.", "hint": "It's from the album Let It Bleed, released in 1969.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'Pleased to meet you, hope you guess my name'?", "correct_answer": "Sympathy for the Devil", "answers": ["Sympathy for the Devil", "Paint It Black", "Midnight Rambler", "Dancing with Mr. D"], "explanation": "Mick Jagger was inspired by Mikhail Bulgakov's novel The Master and Margarita, in which the Devil visits Moscow. The song's percussion was recorded as a samba rhythm.", "hint": "It was released in 1968 on the album Beggars Banquet.", "difficulty": "easy"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'I have to turn my head until my darkness goes'?", "correct_answer": "Paint It Black", "answers": ["Paint It Black", "Gimme Shelter", "Under My Thumb", "19th Nervous Breakdown"], "explanation": "The song features a sitar played by Brian Jones, who taught himself the instrument after hearing it on Beatles records. It reached number one in both the U.S. and the U.K. in 1966.", "hint": "Brian Jones plays a non-Western string instrument on this track.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'And I try and I try and I try and I try'?", "correct_answer": "(I Can't Get No) Satisfaction", "answers": ["(I Can't Get No) Satisfaction", "Get Off of My Cloud", "Jumpin' Jack Flash", "It's Only Rock 'n Roll"], "explanation": "Keith Richards came up with the guitar riff in his sleep. He recorded it on a cassette player next to his bed, fell back asleep, and found it the next morning.", "hint": "The guitar riff was recorded on a bedside cassette player.", "difficulty": "easy"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'Lose your dreams and you will lose your mind'?", "correct_answer": "Ruby Tuesday", "answers": ["Ruby Tuesday", "Lady Jane", "As Tears Go By", "Angie"], "explanation": "Keith Richards wrote the song about a girlfriend who was always coming and going without explanation. It hit number one in the U.S. in 1967.", "hint": "It was released in 1967 as a double A-side single.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'But if you try sometimes, well, you just might find you get what you need'?", "correct_answer": "You Can't Always Get What You Want", "answers": ["You Can't Always Get What You Want", "Satisfaction", "Wild Horses", "Miss You"], "explanation": "The song opens with the Bach Choir singing a choral arrangement, recorded at Olympic Studios in London. The choir members had no idea who the Rolling Stones were.", "hint": "It opens with a choir singing before the band kicks in.", "difficulty": "easy"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'I was raised by a toothless, bearded hag'?", "correct_answer": "Jumpin' Jack Flash", "answers": ["Jumpin' Jack Flash", "Street Fighting Man", "Sympathy for the Devil", "Brown Sugar"], "explanation": "The name came from Keith Richards' gardener, Jack Dyer, whose footsteps woke Jagger one morning. When Jagger asked what the noise was, Richards said, 'Oh, that's jumpin' Jack.'", "hint": "Keith Richards named it after his gardener.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'You make a dead man come'?", "correct_answer": "Start Me Up", "answers": ["Start Me Up", "Jumpin' Jack Flash", "It's Only Rock 'n Roll", "Brown Sugar"], "explanation": "The song was originally recorded as a reggae track during the Some Girls sessions in 1977. It sat unreleased for four years before the band reworked it as a rock song.", "hint": "The band tried this song as a reggae track before reworking it years later.", "difficulty": "hard"}, {"topic": "Music", "question": "What Rolling Stones song contains the lyric 'I was dreaming of a steel guitar engagement'?", "correct_answer": "Wild Horses", "answers": ["Wild Horses", "Angie", "Ruby Tuesday", "As Tears Go By"], "explanation": "Keith Richards wrote the song around the time his son Marlon was born. He didn't want to leave for the studio, and the phrase 'wild horses couldn't drag me away' came from that feeling.", "hint": "It's from the album Sticky Fingers, released in 1971.", "difficulty": "hard"}, {"topic": "Music", "question": "What Doors song contains the lyric 'The time to hesitate is through'?", "correct_answer": "Light My Fire", "answers": ["Light My Fire", "Break On Through (To the Other Side)", "Love Me Two Times", "Touch Me"], "explanation": "Robby Krieger wrote most of the song, not Jim Morrison. The album version runs over seven minutes, but the single was edited down to under three for radio.", "hint": "Robby Krieger, not Jim Morrison, wrote most of this song.", "difficulty": "medium"}, {"topic": "Music", "question": "What Doors song contains the lyric 'Into this house we're born, into this world we're thrown'?", "correct_answer": "Riders on the Storm", "answers": ["Riders on the Storm", "The End", "L.A. Woman", "Waiting for the Sun"], "explanation": "It was the last song the Doors recorded with Jim Morrison. He died in Paris three weeks after the album was released. The rain and thunder sound effects were added in the studio.", "hint": "You can hear rain and thunder sound effects on the recording.", "difficulty": "medium"}, {"topic": "Music", "question": "What Doors song contains the lyric 'The killer awoke before dawn, he put his boots on'?", "correct_answer": "The End", "answers": ["The End", "Riders on the Storm", "Not to Touch the Earth", "The Soft Parade"], "explanation": "The song runs nearly 12 minutes. Francis Ford Coppola used it in the opening and closing sequences of Apocalypse Now, bringing it to a new generation of listeners in 1979.", "hint": "It runs nearly 12 minutes and was used in a famous 1979 Vietnam War film.", "difficulty": "medium"}, {"topic": "Music", "question": "What Doors song contains the lyric 'Faces look ugly when you're alone'?", "correct_answer": "People Are Strange", "answers": ["People Are Strange", "Strange Days", "Moonlight Drive", "The Spy"], "explanation": "Robby Krieger and Jim Morrison wrote the song after Morrison took a depressed walk through Laurel Canyon in Los Angeles. By the time they came back down the hill, the song was finished.", "hint": "It's from the Doors' second album, Strange Days.", "difficulty": "medium"}, {"topic": "Music", "question": "What Doors song contains the lyric 'Let it roll, baby, roll, let it roll all night long'?", "correct_answer": "Roadhouse Blues", "answers": ["Roadhouse Blues", "L.A. Woman", "Love Her Madly", "Been Down So Long"], "explanation": "John Sebastian of the Lovin' Spoonful played harmonica on the track, credited as 'G. Puglese' to avoid contract issues with his own label.", "hint": "It's from the album Morrison Hotel, released in 1970.", "difficulty": "medium"}, {"topic": "Music", "question": "What Doors song contains the lyric 'She get high, she get high, she get high'?", "correct_answer": "Break On Through (To the Other Side)", "answers": ["Break On Through (To the Other Side)", "Light My Fire", "Soul Kitchen", "Twentieth Century Fox"], "explanation": "It was the first track on the Doors' 1967 debut album and their first single. The word 'high' was censored from the radio version.", "hint": "It was the Doors' first single, released in 1967.", "difficulty": "hard"}, {"topic": "Music", "question": "What Doors song contains the lyric 'Mr. Mojo Risin'?", "correct_answer": "L.A. Woman", "answers": ["L.A. Woman", "Riders on the Storm", "Roadhouse Blues", "The Changeling"], "explanation": "'Mr. Mojo Risin' is an anagram of 'Jim Morrison.' The song was recorded in the band's rehearsal space because Morrison refused to go back into a professional studio.", "hint": "It's the title track of the Doors' final album with Morrison.", "difficulty": "hard"}, {"topic": "Music", "question": "What Doors song contains the lyric 'We want the world and we want it now'?", "correct_answer": "When the Music's Over", "answers": ["When the Music's Over", "The End", "Five to One", "The Unknown Soldier"], "explanation": "The song runs over 11 minutes and closes Side B of the 1967 album Strange Days. Morrison screams the line near the end of the track.", "hint": "It runs over 11 minutes and closes an album's second side.", "difficulty": "hard"}, {"topic": "Music", "question": "What Doors song contains the lyric 'Well, I just got into town about an hour ago'?", "correct_answer": "Who Do You Love?", "answers": ["Who Do You Love?", "Back Door Man", "Roadhouse Blues", "Gloria"], "explanation": "The Doors didn't write this song — it was originally recorded by Bo Diddley in 1956. The Doors' version appeared on their 1970 live album Absolutely Live.", "hint": "The Doors didn't write this — it's a cover of a 1950s song.", "difficulty": "hard"}, {"topic": "Music", "question": "What Doors song contains the lyric 'Before I sink into the big sleep'?", "correct_answer": "The Crystal Ship", "answers": ["The Crystal Ship", "The End", "Moonlight Drive", "End of the Night"], "explanation": "Morrison wrote the song about a breakup with his girlfriend Mary Werbelow. It was the B-side to 'Light My Fire' and appears on the Doors' 1967 debut album.", "hint": "Morrison wrote it about a breakup with his girlfriend.", "difficulty": "hard"}]
</script>

<script>
let quizData = [];
let current = 0;
let score = 0;
let firstTryCount = 0;
let streak = 0;
let bestStreak = 0;
let attempts = 0;
let hintShown = false;
let eliminatedCount = 0;
let answered = false;
let wrongPicks = [];

function loadQuestions() {
  quizData = JSON.parse(document.getElementById('quiz-data').textContent);
  // Shuffle questions
  for (let i = quizData.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
  }
  loadQuestion();
}

function loadQuestion() {
  const q = quizData[current];
  answered = false;
  attempts = 0;
  hintShown = false;
  eliminatedCount = 0;
  wrongPicks = [];

  // Meta badges
  const meta = document.getElementById('qMeta');
  const diffClass = q.difficulty === 'easy' ? 'badge-easy' : q.difficulty === 'medium' ? 'badge-medium' : 'badge-hard';
  meta.innerHTML = `<span class="badge badge-topic">${q.topic}</span><span class="badge ${diffClass}">${q.difficulty}</span>`;

  document.getElementById('qText').textContent = q.question;
  document.getElementById('progressText').textContent = `Question ${current + 1} of ${quizData.length}`;
  document.getElementById('progressFill').style.width = ((current + 1) / quizData.length * 100) + '%';
  document.getElementById('attemptsCounter').textContent = '';

  // Shuffle answers
  const shuffled = [...q.answers];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  q._shuffled = shuffled;

  const area = document.getElementById('answersArea');
  area.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  shuffled.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${ans}</span>`;
    btn.dataset.answer = ans;
    btn.addEventListener('click', () => handleAnswer(btn, ans));
    area.appendChild(btn);
  });

  document.getElementById('hintArea').style.display = 'none';
  document.getElementById('hintArea').innerHTML = '';
  document.getElementById('feedbackArea').style.display = 'none';
  document.getElementById('btnArea').style.display = 'none';

  updateScoreDisplay();
}

function handleAnswer(btn, answer) {
  if (answered) return;
  if (wrongPicks.includes(answer)) return;

  const q = quizData[current];
  attempts++;

  if (answer === q.correct_answer) {
    // Correct!
    answered = true;
    btn.classList.add('correct');
    disableAllButtons();

    if (attempts === 1) {
      score += 3;
      firstTryCount++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
    } else if (attempts === 2) {
      score += 2;
      streak = 0;
    } else {
      score += 1;
      streak = 0;
    }

    const fb = document.getElementById('feedbackArea');
    fb.style.display = 'block';
    const tryText = attempts === 1 ? '1st try! +3 pts' : attempts === 2 ? '2nd try! +2 pts' : `${attempts} tries. +1 pt`;
    fb.innerHTML = `<div class="feedback-box correct-fb">
      <div class="fb-title">Correct! (${tryText})</div>
      <div class="fb-explain">${q.explanation}</div>
    </div>`;

    showNextButton();
    updateScoreDisplay();
  } else {
    // Wrong
    btn.classList.add('wrong');
    btn.classList.add('dimmed');
    btn.disabled = true;
    wrongPicks.push(answer);

    document.getElementById('attemptsCounter').textContent = `Attempts: ${attempts}`;

    // Disable answer buttons while hint offer is showing
    document.querySelectorAll('.answer-btn').forEach(b => { if (!b.disabled) b.disabled = true; b._wasEnabled = !b.classList.contains('dimmed'); });

    const hintArea = document.getElementById('hintArea');
    hintArea.style.display = 'block';

    if (attempts <= 2) {
      const hintCost = 1;
      const hintNum = attempts;
      hintArea.innerHTML += `<div class="hint-box" id="hintOffer">Do you want a hint? It will cost ${hintCost} point.<br>
        <button class="hint-offer-btn hint-yes" id="hintYes">Yes</button>
        <button class="hint-offer-btn hint-no" id="hintNo">No</button>
      </div>`;

      document.getElementById('hintYes').addEventListener('click', () => {
        score = Math.max(0, score - hintCost);
        updateScoreDisplay();
        const offer = document.getElementById('hintOffer');

        if (hintNum === 1) {
          offer.innerHTML = `<span class="hint-label">Hint 1:</span> ${q.hint}`;
        } else {
          // Anagram hint
          const chars = q.correct_answer.replace(/\\s+/g, '').toLowerCase().split('');
          for (let i = chars.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [chars[i], chars[j]] = [chars[j], chars[i]];
          }
          let anagram = chars.join('');
          if (anagram === q.correct_answer.replace(/\\s+/g, '').toLowerCase()) {
            anagram = chars.reverse().join('');
          }
          offer.id = 'anagramBox';
          offer.innerHTML = `<span class="hint-label">Hint 2:</span> This anagram of the correct answer will disappear in 2 secs: <strong>${anagram}</strong>`;
          setTimeout(() => {
            if (answered) return;
            let timeLeft = 2;
            const anagramInterval = setInterval(() => {
              timeLeft--;
              if (timeLeft <= 0) {
                clearInterval(anagramInterval);
                const box = document.getElementById('anagramBox');
                if (box) {
                  box.innerHTML = '<span class="hint-label">Hint 2:</span> The two seconds are up. You can choose your answer now.';
                }
              }
            }, 1000);
          }, 1500);
        }
        // Re-enable remaining answer buttons
        document.querySelectorAll('.answer-btn').forEach(b => { if (b._wasEnabled) b.disabled = false; });
      });

      document.getElementById('hintNo').addEventListener('click', () => {
        // No hint — end the question, flash correct answer
        endQuestionWrong(q);
      });
    } else {
      // 3rd+ wrong answer — end the question
      endQuestionWrong(q);
    }
  }
}

function endQuestionWrong(q) {
  answered = true;
  streak = 0;
  disableAllButtons();
  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => {
    if (b.dataset.answer === q.correct_answer) {
      b.classList.add('flash-correct');
    }
  });
  const fb = document.getElementById('feedbackArea');
  fb.style.display = 'block';
  fb.innerHTML = `<div class="feedback-box" style="background:rgba(239,83,80,0.1);border:1px solid #c62828;color:#ef9a9a;">
    <div class="fb-title" style="color:#ef5350;">Wrong. The answer was: ${q.correct_answer}</div>
    <div class="fb-explain">${q.explanation}</div>
  </div>`;
  showNextButton();
  updateScoreDisplay();
}

function disableAllButtons() {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
}

function showNextButton() {
  const btnArea = document.getElementById('btnArea');
  btnArea.style.display = 'block';
  if (current < quizData.length - 1) {
    btnArea.innerHTML = '<button class="btn btn-next" id="nextBtn">Next Question</button>';
    document.getElementById('nextBtn').addEventListener('click', () => { current++; loadQuestion(); });
  } else {
    btnArea.innerHTML = '<button class="btn btn-next" id="finishBtn">See Results</button>';
    document.getElementById('finishBtn').addEventListener('click', showResults);
  }
}

function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('firstTryDisplay').textContent = firstTryCount;
  document.getElementById('streakDisplay').textContent = streak;
}

function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');
  const rc = document.getElementById('resultsCard');
  rc.classList.remove('hidden');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('outOf').textContent = `out of ${quizData.length * 3}`;

  const maxScore = quizData.length * 3;
  const pct = score / maxScore;
  let msg;
  if (pct >= 0.95) msg = "Incredible! Nearly perfect!";
  else if (pct >= 0.8) msg = "Excellent work!";
  else if (pct >= 0.6) msg = "Great job! Solid knowledge.";
  else if (pct >= 0.4) msg = "Not bad! Room for improvement.";
  else msg = "Keep learning — you'll do better next time!";

  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultStats').innerHTML =
    `Max possible: ${maxScore} pts<br>` +
    `First-try correct: ${firstTryCount} / ${quizData.length}<br>` +
    `Best streak: ${bestStreak}`;
}

document.getElementById('restartBtn').addEventListener('click', () => {
  current = 0; score = 0; firstTryCount = 0; streak = 0; bestStreak = 0;
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('resultsCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  // Re-shuffle
  for (let i = quizData.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
  }
  loadQuestion();
});

// Keyboard support: A, B, C, D keys
document.addEventListener('keydown', e => {
  if (answered) return;
  const map = { a: 0, b: 1, c: 2, d: 3 };
  const idx = map[e.key.toLowerCase()];
  if (idx !== undefined) {
    const btns = document.querySelectorAll('.answer-btn:not(:disabled)');
    const allBtns = document.querySelectorAll('.answer-btn');
    if (allBtns[idx] && !allBtns[idx].disabled) {
      allBtns[idx].click();
    }
  }
});

loadQuestions();
</script>
</body>
</html>
