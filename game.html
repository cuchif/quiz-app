<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0f1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 680px; width: 100%; }

  h1 {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, #f7c948, #ee5a6f, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #555; font-size: 0.95rem; margin-bottom: 2rem; }

  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-text { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .progress-track { background: #1a1d2a; border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #7c5cfc, #ee5a6f, #f7c948);
    transition: width 0.4s ease;
  }
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #555;
  }
  .score-bar span { color: #999; }

  .card {
    background: #181a24;
    border: 1px solid #2a2d3a;
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .q-meta {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .badge {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.65rem;
    border-radius: 6px;
    font-weight: 600;
  }
  .badge-topic { background: rgba(124,92,252,0.15); color: #a48bfc; }
  .badge-easy { background: rgba(76,175,80,0.15); color: #66bb6a; }
  .badge-medium { background: rgba(255,183,77,0.15); color: #ffb74d; }
  .badge-hard { background: rgba(239,83,80,0.15); color: #ef5350; }

  .q-text {
    font-size: 1.25rem;
    line-height: 1.6;
    margin-bottom: 1.5rem;
    color: #eee;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .answer-btn {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    padding: 0.9rem 1.1rem;
    background: #12131b;
    border: 2px solid #2a2d3a;
    border-radius: 12px;
    color: #ccc;
    font-size: 1.05rem;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: #7c5cfc;
    background: rgba(124,92,252,0.08);
    transform: translateX(4px);
  }
  .answer-btn:disabled { cursor: default; opacity: 0.6; }
  .answer-btn .letter {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: #2a2d3a;
    font-weight: 700;
    font-size: 0.85rem;
    color: #888;
    flex-shrink: 0;
  }
  .answer-btn.selected { border-color: #7c5cfc; background: rgba(124,92,252,0.12); }
  .answer-btn.selected .letter { background: #7c5cfc; color: #fff; }
  .answer-btn.correct { border-color: #66bb6a; background: rgba(76,175,80,0.12); }
  .answer-btn.correct .letter { background: #66bb6a; color: #fff; }
  .answer-btn.wrong { border-color: #ef5350; background: rgba(239,83,80,0.08); }
  .answer-btn.wrong .letter { background: #ef5350; color: #fff; }
  .answer-btn.dimmed { opacity: 0.35; }

  .hint-area {
    margin-top: 1rem;
    display: none;
  }
  .hint-box {
    background: rgba(255,183,77,0.1);
    border: 1px solid rgba(255,183,77,0.3);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    color: #ffb74d;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 0.8rem;
  }
  .hint-label { font-weight: 700; margin-right: 0.4rem; }
  .eliminated-text { color: #888; font-size: 0.85rem; font-style: italic; }

  .feedback-area {
    margin-top: 1rem;
    display: none;
  }
  .feedback-box {
    border-radius: 10px;
    padding: 1rem 1.1rem;
    font-size: 1rem;
    line-height: 1.5;
  }
  .feedback-box.correct-fb {
    background: rgba(76,175,80,0.1);
    border: 1px solid #388e3c;
    color: #81c784;
  }
  .feedback-box.correct-fb .fb-title { color: #66bb6a; }
  .feedback-box .fb-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.3rem; }
  .feedback-box .fb-explain { opacity: 0.85; }

  .btn {
    display: inline-block;
    padding: 0.75rem 1.8rem;
    font-size: 1rem;
    font-family: inherit;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    margin-top: 1rem;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-next { background: #f7c948; color: #111; font-weight: 600; }
  .btn-restart { background: #7c5cfc; color: #fff; }

  .btn-area { margin-top: 1rem; display: none; }

  .attempts-counter {
    text-align: center;
    color: #555;
    font-size: 0.8rem;
    margin-top: 0.5rem;
  }

  /* Results */
  .results { text-align: center; padding: 2.5rem 2rem; }
  .results .big-score {
    font-size: 4.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #f7c948, #ee5a6f, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .results .out-of { color: #555; font-size: 1.1rem; margin-bottom: 0.5rem; }
  .results .message { color: #ccc; font-size: 1.2rem; margin-bottom: 0.3rem; }
  .results .stats { color: #666; font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.8; }

  .hidden { display: none !important; }

  @keyframes flash-green {
    0%, 100% { border-color: #66bb6a; background: rgba(76,175,80,0.12); }
    50% { border-color: #a5d6a7; background: rgba(76,175,80,0.3); }
  }
  .answer-btn.flash-correct {
    border-color: #66bb6a;
    background: rgba(76,175,80,0.12);
  }
  .answer-btn.flash-correct .letter { background: #66bb6a; color: #fff; }

  .hint-offer-btn {
    display: inline-block;
    padding: 0.5rem 1.2rem;
    font-size: 0.95rem;
    font-family: inherit;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 0.5rem 0.3rem 0 0;
    transition: transform 0.1s, opacity 0.2s;
  }
  .hint-offer-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .hint-yes { background: #f7c948; color: #111; font-weight: 600; }
  .hint-no { background: #2a2d3a; color: #ccc; }

  .listen-btn {
    display: inline-block;
    margin-top: 0.8rem;
    padding: 0.5rem 1.2rem;
    font-size: 0.9rem;
    font-family: inherit;
    background: #e53935;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .listen-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="container">
  <h1>Quiz Game</h1>
  <div class="subtitle">Wizard of Oz & Trump Administration -- Keep guessing until you get it right!</div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-text" id="progressText">Question 1 of 30</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="score-bar">
      <div>Score: <span id="scoreDisplay">0</span></div>
      <div>First try: <span id="firstTryDisplay">0</span></div>
      <div>Streak: <span id="streakDisplay">0</span></div>
    </div>
  </div>

  <div class="card" id="quizCard">
    <div class="q-meta" id="qMeta"></div>
    <div class="q-text" id="qText"></div>
    <div class="answers" id="answersArea"></div>
    <div class="attempts-counter" id="attemptsCounter"></div>
    <div class="hint-area" id="hintArea"></div>
    <div class="feedback-area" id="feedbackArea"></div>
    <div class="btn-area" id="btnArea"></div>
  </div>

  <div class="card results hidden" id="resultsCard">
    <div class="big-score" id="finalScore"></div>
    <div class="out-of" id="outOf">out of 50</div>
    <div class="message" id="resultMsg"></div>
    <div class="stats" id="resultStats"></div>
    <button class="btn btn-restart" id="restartBtn">Play Again</button>
  </div>
</div>

<script>
let quizData = [];
let current = 0;
let score = 0;
let firstTryCount = 0;
let streak = 0;
let bestStreak = 0;
let attempts = 0;
let hintShown = false;
let eliminatedCount = 0;
let answered = false;
let wrongPicks = [];

function loadQuestions() {
  quizData = JSON.parse(document.getElementById('quiz-data').textContent);
  // Shuffle questions
  for (let i = quizData.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
  }
  loadQuestion();
}

function loadQuestion() {
  const q = quizData[current];
  answered = false;
  attempts = 0;
  hintShown = false;
  eliminatedCount = 0;
  wrongPicks = [];

  // Meta badges
  const meta = document.getElementById('qMeta');
  const diffClass = q.difficulty === 'easy' ? 'badge-easy' : q.difficulty === 'medium' ? 'badge-medium' : 'badge-hard';
  meta.innerHTML = `<span class="badge badge-topic">${q.topic}</span><span class="badge ${diffClass}">${q.difficulty}</span>`;

  document.getElementById('qText').textContent = q.question;
  document.getElementById('progressText').textContent = `Question ${current + 1} of ${quizData.length}`;
  document.getElementById('progressFill').style.width = ((current + 1) / quizData.length * 100) + '%';
  document.getElementById('attemptsCounter').textContent = '';

  // Shuffle answers
  const shuffled = [...q.answers];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  q._shuffled = shuffled;

  const area = document.getElementById('answersArea');
  area.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  shuffled.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${ans}</span>`;
    btn.dataset.answer = ans;
    btn.addEventListener('click', () => handleAnswer(btn, ans));
    area.appendChild(btn);
  });

  document.getElementById('hintArea').style.display = 'none';
  document.getElementById('hintArea').innerHTML = '';
  document.getElementById('feedbackArea').style.display = 'none';
  document.getElementById('btnArea').style.display = 'none';

  updateScoreDisplay();
}

function handleAnswer(btn, answer) {
  if (answered) return;
  if (wrongPicks.includes(answer)) return;

  const q = quizData[current];
  attempts++;

  if (answer === q.correct_answer) {
    // Correct!
    answered = true;
    btn.classList.add('correct');
    disableAllButtons();
    playTwinkle();

    if (attempts === 1) {
      score += 3;
      firstTryCount++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
    } else if (attempts === 2) {
      score += 2;
      streak = 0;
    } else {
      score += 1;
      streak = 0;
    }

    const fb = document.getElementById('feedbackArea');
    fb.style.display = 'block';
    const tryText = attempts === 1 ? '1st try! +3 pts' : attempts === 2 ? '2nd try! +2 pts' : `${attempts} tries. +1 pt`;
    fb.innerHTML = `<div class="feedback-box correct-fb">
      <div class="fb-title">Correct! (${tryText})</div>
      <div class="fb-explain">${q.explanation}</div>
    </div>`;

    showNextButton();
    updateScoreDisplay();
  } else {
    // Wrong
    btn.classList.add('wrong');
    btn.classList.add('dimmed');
    btn.disabled = true;
    wrongPicks.push(answer);

    document.getElementById('attemptsCounter').textContent = `Attempts: ${attempts}`;

    const hintArea = document.getElementById('hintArea');
    hintArea.style.display = 'block';

    if (attempts === 1) {
      hintArea.innerHTML = `<div class="hint-box"><span class="hint-label">Hint:</span> ${q.hint}</div>`;
    } else if (attempts === 2) {
      // Build anagram
      const chars = q.correct_answer.replace(/[\s'"\?\!\.\,\-\(\)]/g, '').toLowerCase().split('');
      for (let i = chars.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [chars[i], chars[j]] = [chars[j], chars[i]];
      }
      let anagram = chars.join('');
      if (anagram === q.correct_answer.replace(/[\s'"\?\!\.\,\-\(\)]/g, '').toLowerCase()) {
        anagram = chars.reverse().join('');
      }
      hintArea.innerHTML += `<div class="hint-box" id="anagramBox">This anagram of the correct answer will disappear in 3 secs: <strong>${anagram}</strong></div>`;
      setTimeout(() => {
        if (answered) return;
        let timeLeft = 3;
        const anagramInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(anagramInterval);
            const box = document.getElementById('anagramBox');
            if (box) {
              box.remove();
            }
          }
        }, 1000);
      }, 1500);
    } else {
      // 3rd+ wrong — end the question
      const anagramBox = document.getElementById('anagramBox');
      if (anagramBox) anagramBox.remove();
      endQuestionWrong(q);
    }
  }
}

function playBoing() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const t = ctx.currentTime;

  // Single bounce — drops down then swoops back up
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(500, t);
  osc.frequency.exponentialRampToValueAtTime(120, t + 0.2);
  osc.frequency.exponentialRampToValueAtTime(700, t + 0.45);
  gain.gain.setValueAtTime(0.5, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.55);
  osc.start(t);
  osc.stop(t + 0.55);
}

function playTwinkle() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const t = ctx.currentTime;
  const notes = [2400, 2800, 3200, 3600, 4000, 4400];

  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    const start = t + i * 0.1;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.06, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
    osc.start(start);
    osc.stop(start + 0.5);

    // Delicate shimmer
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2, start + 0.01);
    gain2.gain.setValueAtTime(0, start);
    gain2.gain.linearRampToValueAtTime(0.02, start + 0.02);
    gain2.gain.exponentialRampToValueAtTime(0.001, start + 0.3);
    osc2.start(start);
    osc2.stop(start + 0.3);
  });
}

function endQuestionWrong(q) {
  answered = true;
  streak = 0;
  score = Math.max(0, score - 3);
  playBoing();
  disableAllButtons();
  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => {
    if (b.dataset.answer === q.correct_answer) {
      b.classList.add('flash-correct');
    }
  });
  const fb = document.getElementById('feedbackArea');
  fb.style.display = 'block';
  fb.innerHTML = `<div class="feedback-box" style="background:rgba(239,83,80,0.1);border:1px solid #c62828;color:#ef9a9a;">
    <div class="fb-title" style="color:#ef5350;">The correct answer is ${q.correct_answer}. (-3 pts.)</div>
    <div class="fb-explain">${q.explanation}</div>
  </div>`;
  showNextButton();
  updateScoreDisplay();
}

function disableAllButtons() {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
}

function showNextButton() {
  const btnArea = document.getElementById('btnArea');
  btnArea.style.display = 'block';
  if (current < quizData.length - 1) {
    btnArea.innerHTML = '<button class="btn btn-next" id="nextBtn">Next Question</button>';
    document.getElementById('nextBtn').addEventListener('click', () => { current++; loadQuestion(); });
  } else {
    btnArea.innerHTML = '<button class="btn btn-next" id="finishBtn">See Results</button>';
    document.getElementById('finishBtn').addEventListener('click', showResults);
  }
}

function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('firstTryDisplay').textContent = firstTryCount;
  document.getElementById('streakDisplay').textContent = streak;
}

function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');
  const rc = document.getElementById('resultsCard');
  rc.classList.remove('hidden');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('outOf').textContent = `out of ${quizData.length * 3}`;

  const maxScore = quizData.length * 3;
  const pct = score / maxScore;
  let msg;
  if (pct >= 0.95) msg = "Incredible! Nearly perfect!";
  else if (pct >= 0.8) msg = "Excellent work!";
  else if (pct >= 0.6) msg = "Great job! Solid knowledge.";
  else if (pct >= 0.4) msg = "Not bad! Room for improvement.";
  else msg = "Keep learning — you'll do better next time!";

  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultStats').innerHTML =
    `Max possible: ${maxScore} pts<br>` +
    `First-try correct: ${firstTryCount} / ${quizData.length}<br>` +
    `Best streak: ${bestStreak}`;
}

document.getElementById('restartBtn').addEventListener('click', () => {
  current = 0; score = 0; firstTryCount = 0; streak = 0; bestStreak = 0;
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('resultsCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  // Re-shuffle
  for (let i = quizData.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
  }
  loadQuestion();
});

// Keyboard support: A, B, C, D keys
document.addEventListener('keydown', e => {
  if (answered) return;
  const map = { a: 0, b: 1, c: 2, d: 3 };
  const idx = map[e.key.toLowerCase()];
  if (idx !== undefined) {
    const btns = document.querySelectorAll('.answer-btn:not(:disabled)');
    const allBtns = document.querySelectorAll('.answer-btn');
    if (allBtns[idx] && !allBtns[idx].disabled) {
      allBtns[idx].click();
    }
  }
});

loadQuestions();
</script>
</body>
</html>
