<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0f1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 680px; width: 100%; }

  h1 {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, #f7c948, #ee5a6f, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #555; font-size: 0.95rem; margin-bottom: 2rem; }

  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-text { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .progress-track { background: #1a1d2a; border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #7c5cfc, #ee5a6f, #f7c948);
    transition: width 0.4s ease;
  }
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #555;
  }
  .score-bar span { color: #999; }

  .card {
    background: #181a24;
    border: 1px solid #2a2d3a;
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .q-meta {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .badge {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.65rem;
    border-radius: 6px;
    font-weight: 600;
  }
  .badge-topic { background: rgba(124,92,252,0.15); color: #a48bfc; }
  .badge-easy { background: rgba(76,175,80,0.15); color: #66bb6a; }
  .badge-medium { background: rgba(255,183,77,0.15); color: #ffb74d; }
  .badge-hard { background: rgba(239,83,80,0.15); color: #ef5350; }

  .q-text {
    font-size: 1.25rem;
    line-height: 1.6;
    margin-bottom: 1.5rem;
    color: #eee;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .answer-btn {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    padding: 0.9rem 1.1rem;
    background: #12131b;
    border: 2px solid #2a2d3a;
    border-radius: 12px;
    color: #ccc;
    font-size: 1.05rem;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: #7c5cfc;
    background: rgba(124,92,252,0.08);
    transform: translateX(4px);
  }
  .answer-btn:disabled { cursor: default; opacity: 0.6; }
  .answer-btn .letter {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: #2a2d3a;
    font-weight: 700;
    font-size: 0.85rem;
    color: #888;
    flex-shrink: 0;
  }
  .answer-btn.selected { border-color: #7c5cfc; background: rgba(124,92,252,0.12); }
  .answer-btn.selected .letter { background: #7c5cfc; color: #fff; }
  .answer-btn.correct { border-color: #66bb6a; background: rgba(76,175,80,0.12); }
  .answer-btn.correct .letter { background: #66bb6a; color: #fff; }
  .answer-btn.wrong { border-color: #ef5350; background: rgba(239,83,80,0.08); }
  .answer-btn.wrong .letter { background: #ef5350; color: #fff; }
  .answer-btn.dimmed { opacity: 0.35; }

  .hint-area {
    margin-top: 1rem;
    display: none;
  }
  .hint-box {
    background: rgba(255,183,77,0.1);
    border: 1px solid rgba(255,183,77,0.3);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    color: #ffb74d;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 0.8rem;
  }
  .hint-label { font-weight: 700; margin-right: 0.4rem; }
  .eliminated-text { color: #888; font-size: 0.85rem; font-style: italic; }

  .feedback-area {
    margin-top: 1rem;
    display: none;
  }
  .feedback-box {
    border-radius: 10px;
    padding: 1rem 1.1rem;
    font-size: 1rem;
    line-height: 1.5;
  }
  .feedback-box.correct-fb {
    background: rgba(76,175,80,0.1);
    border: 1px solid #388e3c;
    color: #81c784;
  }
  .feedback-box.correct-fb .fb-title { color: #66bb6a; }
  .feedback-box .fb-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.3rem; }
  .feedback-box .fb-explain { opacity: 0.85; }

  .btn {
    display: inline-block;
    padding: 0.75rem 1.8rem;
    font-size: 1rem;
    font-family: inherit;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    margin-top: 1rem;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-next { background: #f7c948; color: #111; font-weight: 600; }
  .btn-restart { background: #7c5cfc; color: #fff; }

  .btn-area { margin-top: 1rem; display: none; }

  .attempts-counter {
    text-align: center;
    color: #555;
    font-size: 0.8rem;
    margin-top: 0.5rem;
  }

  /* Results */
  .results { text-align: center; padding: 2.5rem 2rem; }
  .results .big-score {
    font-size: 4.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #f7c948, #ee5a6f, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .results .out-of { color: #555; font-size: 1.1rem; margin-bottom: 0.5rem; }
  .results .message { color: #ccc; font-size: 1.2rem; margin-bottom: 0.3rem; }
  .results .stats { color: #666; font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.8; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <h1>Quiz Game</h1>
  <div class="subtitle">Wizard of Oz & Trump Administration -- Keep guessing until you get it right!</div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-text" id="progressText">Question 1 of 30</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="score-bar">
      <div>Score: <span id="scoreDisplay">0</span></div>
      <div>First try: <span id="firstTryDisplay">0</span></div>
      <div>Streak: <span id="streakDisplay">0</span></div>
    </div>
  </div>

  <div class="card" id="quizCard">
    <div class="q-meta" id="qMeta"></div>
    <div class="q-text" id="qText"></div>
    <div class="answers" id="answersArea"></div>
    <div class="attempts-counter" id="attemptsCounter"></div>
    <div class="hint-area" id="hintArea"></div>
    <div class="feedback-area" id="feedbackArea"></div>
    <div class="btn-area" id="btnArea"></div>
  </div>

  <div class="card results hidden" id="resultsCard">
    <div class="big-score" id="finalScore"></div>
    <div class="out-of" id="outOf">out of 50</div>
    <div class="message" id="resultMsg"></div>
    <div class="stats" id="resultStats"></div>
    <button class="btn btn-restart" id="restartBtn">Play Again</button>
  </div>
</div>

sic", "question": "What Beatles song begins with the line 'Picture yourself in a boat on a river'?", "correct_answer": "Lucy in the Sky with Diamonds", "answers": ["Lucy in the Sky with Diamonds", "Strawberry Fields Forever", "Across the Universe", "Being for the Benefit of Mr. Kite!"], "explanation": "John Lennon said the song was inspired by a drawing his son Julian brought home from school. The initials L-S-D were, according to Lennon, a coincidence.", "hint": "The title contains a woman's name and a gemstone.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song begins with the line 'Dear Prudence, won't you come out to play'?", "correct_answer": "Dear Prudence", "answers": ["Dear Prudence", "Martha My Dear", "Lady Madonna", "Julia"], "explanation": "Lennon wrote the song in India about Prudence Farrow, Mia Farrow's sister, who was meditating so intensely during the group's retreat that she wouldn't come outside.", "hint": "The title is a greeting followed by a woman's first name.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song begins with the line 'Living is easy with eyes closed'?", "correct_answer": "Strawberry Fields Forever", "answers": ["Strawberry Fields Forever", "Lucy in the Sky with Diamonds", "Across the Universe", "Norwegian Wood"], "explanation": "Strawberry Field was a Salvation Army children's home near where Lennon grew up in Liverpool. He used to climb over the wall to play in the garden.", "hint": "The title refers to a real place in Liverpool.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song begins with the line 'Hey Jude, don't make it bad'?", "correct_answer": "Hey Jude", "answers": ["Hey Jude", "Let It Be", "Hello, Goodbye", "All You Need Is Love"], "explanation": "Paul McCartney wrote the song to comfort John Lennon's son Julian during his parents' divorce. The original working title was 'Hey Jules.'", "hint": "The title is a greeting followed by a man's name.", "difficulty": "easy"}, {"topic": "Music", "question": "What Beatles song begins with the line 'I once had a girl, or should I say, she once had me'?", "correct_answer": "Norwegian Wood", "answers": ["Norwegian Wood", "Girl", "In My Life", "If I Fell"], "explanation": "Lennon wrote the song about an affair he was having. 'Norwegian Wood' was a joking reference to the cheap pine paneling in the woman's apartment.", "hint": "The title refers to a type of Scandinavian lumber.", "difficulty": "medium"}, {"topic": "Music", "question": "What Beatles song begins with the line 'There are places I remember all my life'?", "correct_answer": "In My Life", "answers": ["In My Life", "Yesterday", "The Long and Winding Road", "Penny Lane"], "explanation": "Lennon originally wrote the lyrics as a list of Liverpool landmarks, including Penny Lane and Strawberry Field. He rewrote it as a more personal reflection.", "hint": "The title is a three-word phrase about personal experience.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'I see a red door and I want it painted black'?", "correct_answer": "Paint It Black", "answers": ["Paint It Black", "Sympathy for the Devil", "Gimme Shelter", "Street Fighting Man"], "explanation": "The song features a sitar played by Brian Jones, who taught himself the instrument after hearing it on Beatles records. It reached number one in both the U.S. and the U.K. in 1966.", "hint": "The title is a three-word command involving a color.", "difficulty": "easy"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'Please allow me to introduce myself, I'm a man of wealth and taste'?", "correct_answer": "Sympathy for the Devil", "answers": ["Sympathy for the Devil", "Paint It Black", "Midnight Rambler", "Dancing with Mr. D"], "explanation": "Mick Jagger was inspired by Mikhail Bulgakov's novel The Master and Margarita, in which the Devil visits Moscow. The song's percussion was recorded as a samba rhythm.", "hint": "The title expresses feeling sorry for a very evil figure.", "difficulty": "easy"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'I can't get no satisfaction'?", "correct_answer": "(I Can't Get No) Satisfaction", "answers": ["(I Can't Get No) Satisfaction", "Get Off of My Cloud", "Jumpin' Jack Flash", "It's Only Rock 'n Roll"], "explanation": "Keith Richards came up with the guitar riff in his sleep. He recorded it on a cassette player next to his bed, fell back asleep, and found it the next morning.", "hint": "The title is about not being able to find fulfillment.", "difficulty": "easy"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'Oh, a storm is threatening my very life today'?", "correct_answer": "Gimme Shelter", "answers": ["Gimme Shelter", "Paint It Black", "Wild Horses", "You Can't Always Get What You Want"], "explanation": "The female vocal on the song is by Merry Clayton, who was called to the studio late at night while pregnant. She sang with such intensity that her voice cracks audibly during the recording.", "hint": "The title is a demand for protection or a safe place.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'Childhood living is easy to do'?", "correct_answer": "Wild Horses", "answers": ["Wild Horses", "Angie", "Ruby Tuesday", "As Tears Go By"], "explanation": "Keith Richards wrote the song around the time his son Marlon was born. He didn't want to leave for the studio, and the phrase 'wild horses couldn't drag me away' came from that feeling.", "hint": "The title refers to untamed animals.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'I said hey, you, get off of my cloud'?", "correct_answer": "Get Off of My Cloud", "answers": ["Get Off of My Cloud", "(I Can't Get No) Satisfaction", "19th Nervous Breakdown", "Have You Seen Your Mother, Baby"], "explanation": "The song was released in 1965 as the follow-up single to 'Satisfaction.' Jagger later said the song was about people invading his personal space after the band became famous.", "hint": "The title tells someone to leave you alone, using a weather word.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'She would never say where she came from'?", "correct_answer": "Ruby Tuesday", "answers": ["Ruby Tuesday", "Lady Jane", "Angie", "Miss You"], "explanation": "Keith Richards wrote the song about a girlfriend who was always coming and going without explanation. It hit number one in the U.S. in 1967.", "hint": "The title is a woman's name followed by a day of the week.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'I saw her today at the reception'?", "correct_answer": "You Can't Always Get What You Want", "answers": ["You Can't Always Get What You Want", "Miss You", "Angie", "Start Me Up"], "explanation": "The song opens with the Bach Choir singing a choral arrangement, recorded at Olympic Studios in London. The choir members had no idea who the Rolling Stones were.", "hint": "The title is a lesson about expectations versus reality.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'I was born in a crossfire hurricane'?", "correct_answer": "Jumpin' Jack Flash", "answers": ["Jumpin' Jack Flash", "Street Fighting Man", "Sympathy for the Devil", "Brown Sugar"], "explanation": "The name came from Keith Richards' gardener, Jack Dyer, whose footsteps woke Jagger one morning. When Jagger asked what the noise was, Richards said, 'Oh, that's jumpin' Jack.'", "hint": "The title is a man's nickname followed by a word for a burst of light.", "difficulty": "medium"}, {"topic": "Music", "question": "What Rolling Stones song begins with the line 'Angie, Angie, when will those clouds all disappear'?", "correct_answer": "Angie", "answers": ["Angie", "Ruby Tuesday", "Wild Horses", "As Tears Go By"], "explanation": "Despite widespread speculation, Jagger and Richards have both said the song is not about any specific person. Richards wrote it while recovering from a heroin addiction in Switzerland.", "hint": "The title is a woman's first name.", "difficulty": "easy"}, {"topic": "Music", "question": "What Doors song begins with the line 'You know that it would be untrue'?", "correct_answer": "Light My Fire", "answers": ["Light My Fire", "Break On Through", "Riders on the Storm", "The End"], "explanation": "Robby Krieger wrote most of the song, not Jim Morrison. The album version runs over seven minutes, but the single was edited down to under three for radio.", "hint": "The title is a three-word request involving flames.", "difficulty": "easy"}, {"topic": "Music", "question": "What Doors song begins with the line 'You know the day destroys the night'?", "correct_answer": "Break On Through (To the Other Side)", "answers": ["Break On Through (To the Other Side)", "Light My Fire", "Roadhouse Blues", "People Are Strange"], "explanation": "It was the first track on the Doors' 1967 debut album and their first single. The original recording included the word 'high,' which was censored for the radio release.", "hint": "The title is about pushing past a barrier.", "difficulty": "medium"}, {"topic": "Music", "question": "What Doors song begins with the line 'Riders on the storm, riders on the storm'?", "correct_answer": "Riders on the Storm", "answers": ["Riders on the Storm", "The End", "L.A. Woman", "Waiting for the Sun"], "explanation": "It was the last song the Doors recorded with Jim Morrison. He died in Paris three weeks after the album was released. The rain and thunder sound effects were added in the studio.", "hint": "The title describes people traveling through bad weather.", "difficulty": "easy"}, {"topic": "Music", "question": "What Doors song begins with the line 'This is the end, beautiful friend'?", "correct_answer": "The End", "answers": ["The End", "Riders on the Storm", "When the Music's Over", "The Crystal Ship"], "explanation": "The song runs nearly 12 minutes. Francis Ford Coppola used it in the opening and closing sequences of Apocalypse Now, bringing it to a new generation of listeners in 1979.", "hint": "The two-word title refers to a conclusion or finale.", "difficulty": "easy"}, {"topic": "Music", "question": "What Doors song begins with the line 'People are strange when you're a stranger'?", "correct_answer": "People Are Strange", "answers": ["People Are Strange", "Strange Days", "Moonlight Drive", "Love Her Madly"], "explanation": "Robby Krieger and Jim Morrison wrote the song after Morrison took a depressed walk through Laurel Canyon in Los Angeles. By the time they came back down the hill, the song was finished.", "hint": "The title is a three-word observation about human behavior.", "difficulty": "easy"}, {"topic": "Music", "question": "What Doors song begins with the line 'Keep your eyes on the road, your hands upon the wheel'?", "correct_answer": "Roadhouse Blues", "answers": ["Roadhouse Blues", "L.A. Woman", "Love Her Madly", "Break On Through (To the Other Side)"], "explanation": "The song was recorded in just a few takes. Lonnie Mack played bass on the track, and John Sebastian of the Lovin' Spoonful played harmonica, credited as 'G. Puglese' to avoid contract issues.", "hint": "The title combines a type of highway bar with a music genre.", "difficulty": "medium"}, {"topic": "Music", "question": "What Doors song begins with the line 'When the music's over, turn out the lights'?", "correct_answer": "When the Music's Over", "answers": ["When the Music's Over", "The End", "Soul Kitchen", "The Soft Parade"], "explanation": "The song runs over 11 minutes and closes Side B of the 1967 album Strange Days. Morrison screams 'We want the world and we want it now!' near the end.", "hint": "The title describes what to do after the last song plays.", "difficulty": "hard"}, {"topic": "Music", "question": "What Doors song begins with the line 'Hello, I love you, won't you tell me your name'?", "correct_answer": "Hello, I Love You", "answers": ["Hello, I Love You", "Touch Me", "Love Her Madly", "Love Me Two Times"], "explanation": "Morrison wrote the song after seeing a girl walking on the beach in Venice, California. The guitar riff has been compared to the Kinks' 'All Day and All of the Night,' which came out four years earlier.", "hint": "The title is a greeting followed by a declaration of affection.", "difficulty": "easy"}, {"topic": "Music", "question": "What Doors song begins with the line 'Before you slip into unconsciousness'?", "correct_answer": "The Crystal Ship", "answers": ["The Crystal Ship", "The End", "Moonlight Drive", "End of the Night"], "explanation": "Morrison wrote the song about a breakup with his girlfriend Mary Werbelow. It was the B-side to 'Light My Fire' and appears on the Doors' 1967 debut album.", "hint": "The title refers to a transparent vessel that sails.", "difficulty": "hard"}, {"topic": "Music", "question": "What Doors song begins with the line 'Well, show me the way to the next whiskey bar'?", "correct_answer": "Alabama Song (Whisky Bar)", "answers": ["Alabama Song (Whisky Bar)", "Roadhouse Blues", "Back Door Man", "Who Do You Love"], "explanation": "The Doors didn't write this song. It was originally composed by Kurt Weill and Bertolt Brecht for their 1930 opera Rise and Fall of the City of Mahagonny.", "hint": "The title includes the name of a U.S. state.", "difficulty": "hard"}]

<script>
let quizData = [];
let current = 0;
let score = 0;
let firstTryCount = 0;
let streak = 0;
let bestStreak = 0;
let attempts = 0;
let hintShown = false;
let eliminatedCount = 0;
let answered = false;
let wrongPicks = [];

function loadQuestions() {
  quizData = JSON.parse(document.getElementById('quiz-data').textContent);
  // Shuffle questions
  for (let i = quizData.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
  }
  loadQuestion();
}

function loadQuestion() {
  const q = quizData[current];
  answered = false;
  attempts = 0;
  hintShown = false;
  eliminatedCount = 0;
  wrongPicks = [];

  // Meta badges
  const meta = document.getElementById('qMeta');
  const diffClass = q.difficulty === 'easy' ? 'badge-easy' : q.difficulty === 'medium' ? 'badge-medium' : 'badge-hard';
  meta.innerHTML = `<span class="badge badge-topic">${q.topic}</span><span class="badge ${diffClass}">${q.difficulty}</span>`;

  document.getElementById('qText').textContent = q.question;
  document.getElementById('progressText').textContent = `Question ${current + 1} of ${quizData.length}`;
  document.getElementById('progressFill').style.width = ((current + 1) / quizData.length * 100) + '%';
  document.getElementById('attemptsCounter').textContent = '';

  // Shuffle answers
  const shuffled = [...q.answers];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  q._shuffled = shuffled;

  const area = document.getElementById('answersArea');
  area.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  shuffled.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${ans}</span>`;
    btn.dataset.answer = ans;
    btn.addEventListener('click', () => handleAnswer(btn, ans));
    area.appendChild(btn);
  });

  document.getElementById('hintArea').style.display = 'none';
  document.getElementById('hintArea').innerHTML = '';
  document.getElementById('feedbackArea').style.display = 'none';
  document.getElementById('btnArea').style.display = 'none';

  updateScoreDisplay();
}

function handleAnswer(btn, answer) {
  if (answered) return;
  if (wrongPicks.includes(answer)) return;

  const q = quizData[current];
  attempts++;

  if (answer === q.correct_answer) {
    // Correct!
    answered = true;
    btn.classList.add('correct');
    disableAllButtons();

    if (attempts === 1) {
      score += 3;
      firstTryCount++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
    } else if (attempts === 2) {
      score += 2;
      streak = 0;
    } else {
      score += 1;
      streak = 0;
    }

    const fb = document.getElementById('feedbackArea');
    fb.style.display = 'block';
    const tryText = attempts === 1 ? '1st try! +3 pts' : attempts === 2 ? '2nd try! +2 pts' : `${attempts} tries. +1 pt`;
    fb.innerHTML = `<div class="feedback-box correct-fb">
      <div class="fb-title">Correct! (${tryText})</div>
      <div class="fb-explain">${q.explanation}</div>
    </div>`;

    showNextButton();
    updateScoreDisplay();
  } else {
    // Wrong
    btn.classList.add('wrong');
    btn.classList.add('dimmed');
    btn.disabled = true;
    wrongPicks.push(answer);

    document.getElementById('attemptsCounter').textContent = `Attempts: ${attempts}`;

    // Show hint after first wrong answer
    const hintArea = document.getElementById('hintArea');
    hintArea.style.display = 'block';

    if (attempts === 1) {
      hintArea.innerHTML = `<div class="hint-box"><span class="hint-label">Hint 1:</span> ${q.hint}</div>`;
    } else if (attempts === 2) {
      // Scramble the correct answer into a single anagram (no spaces)
      const chars = q.correct_answer.replace(/\s+/g, '').toLowerCase().split('');
      for (let i = chars.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [chars[i], chars[j]] = [chars[j], chars[i]];
      }
      let anagram = chars.join('');
      // Make sure it's not accidentally the same as the answer without spaces
      if (anagram === q.correct_answer.replace(/\s+/g, '').toLowerCase()) {
        anagram = chars.reverse().join('');
      }
      hintArea.innerHTML += `<div class="hint-box"><span class="hint-label">Hint 2:</span> Unscramble this anagram: <strong>${anagram}</strong></div>`;
    }
    // After 2 wrong, only 1 option remains (the correct one), so they'll get it next click
  }
}

function disableAllButtons() {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
}

function showNextButton() {
  const btnArea = document.getElementById('btnArea');
  btnArea.style.display = 'block';
  if (current < quizData.length - 1) {
    btnArea.innerHTML = '<button class="btn btn-next" id="nextBtn">Next Question</button>';
    document.getElementById('nextBtn').addEventListener('click', () => { current++; loadQuestion(); });
  } else {
    btnArea.innerHTML = '<button class="btn btn-next" id="finishBtn">See Results</button>';
    document.getElementById('finishBtn').addEventListener('click', showResults);
  }
}

function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('firstTryDisplay').textContent = firstTryCount;
  document.getElementById('streakDisplay').textContent = streak;
}

function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');
  const rc = document.getElementById('resultsCard');
  rc.classList.remove('hidden');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('outOf').textContent = `out of ${quizData.length * 3}`;

  const maxScore = quizData.length * 3;
  const pct = score / maxScore;
  let msg;
  if (pct >= 0.95) msg = "Incredible! Nearly perfect!";
  else if (pct >= 0.8) msg = "Excellent work!";
  else if (pct >= 0.6) msg = "Great job! Solid knowledge.";
  else if (pct >= 0.4) msg = "Not bad! Room for improvement.";
  else msg = "Keep learning — you'll do better next time!";

  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultStats').innerHTML =
    `Max possible: ${maxScore} pts<br>` +
    `First-try correct: ${firstTryCount} / ${quizData.length}<br>` +
    `Best streak: ${bestStreak}`;
}

document.getElementById('restartBtn').addEventListener('click', () => {
  current = 0; score = 0; firstTryCount = 0; streak = 0; bestStreak = 0;
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('resultsCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  // Re-shuffle
  for (let i = quizData.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
  }
  loadQuestion();
});

// Keyboard support: A, B, C, D keys
document.addEventListener('keydown', e => {
  if (answered) return;
  const map = { a: 0, b: 1, c: 2, d: 3 };
  const idx = map[e.key.toLowerCase()];
  if (idx !== undefined) {
    const btns = document.querySelectorAll('.answer-btn:not(:disabled)');
    const allBtns = document.querySelectorAll('.answer-btn');
    if (allBtns[idx] && !allBtns[idx].disabled) {
      allBtns[idx].click();
    }
  }
});

loadQuestions();
</script>
</body>
</html>
